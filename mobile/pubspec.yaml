name: aries_mobile
description: Aries Android/iOS/Web
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5

  # Navigation
  go_router: ^13.2.4

  # DI
  get_it: ^7.7.0
  injectable: ^2.4.1

  # HTTP
  dio: ^5.4.3+1

  # Local storage (tokens)
  flutter_secure_storage: ^9.2.2

  # Functional error handling
  dartz: ^0.10.1

  # Formatting
  intl: ^0.19.0

  # Reports
  pdf: ^3.10.8
  printing: ^5.13.0
  excel: ^4.0.6
  path_provider: ^2.1.3
  share_plus: ^10.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  injectable_generator: ^2.4.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
